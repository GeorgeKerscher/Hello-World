      <h3 class="H2">Skill Drill 2-1: Proper Removal of Medical Gloves</h3>
      <p class="TXL">Test your knowledge of this skill by placing the following photos in the correct order. Number the first step with a “1,” the second step with a “2,” and so forth.</p>
      <figure class="FIGI">
        <img src="../images/9781284319705_UNFIG013-01.jpg" alt="A photo of an Emergency Medical Responder using one bare hand to pull the wrist area of a gloved hand holding a crumpled glove." />
        <figcaption>
          <p class="title">© Jones &amp; Bartlett Learning</p>
          <p class="title">To remove the second glove, slide two fingers of your bare hand inside the remaining glove at the wrist.</p>
        </figcaption>
      </figure>
      <figure class="FIGI">
        <img src="../images/9781284319705_UNFIG013-03.jpg" alt="A photo of an Emergency Medical Responder wearing a glove on one hand while pinching the outer wrist area of the other gloved hand." />
        <figcaption>
          <p class="title">© Jones &amp; Bartlett Learning</p>
          <p class="title">____________ Begin by removing one glove. Pinch one glove on the outside near the wrist.</p>
        </figcaption>
      </figure>
      <figure class="FIGI">
        <img src="../images/9781284319705_UNFIG013-02.jpg" alt="A photo of an Emergency Medical Responder holding a partially removed glove with one hand while the other hand remains gloved." />
        <figcaption>
          <p class="title">© Jones &amp; Bartlett Learning</p>
          <p class="title">___________ Gently pull the glove off, turning it inside out as you pull with the hand that is still gloved. Hold the removed glove in your gloved hand.</p>
        </figcaption>
      </figure>
      <figure class="FIGI">
        <img src="../images/9781284319705_UNFIG013-04.jpg" alt="A photo of an Emergency Medical Responder with one bare hand extended and the other hand gloved while holding a crumpled glove." />
        <figcaption>
          <p class="title">© Jones &amp; Bartlett Learning</p>
          <p class="title">
            _______ Gently stretch the glove away from the hand and pull the glove off, keeping it inside out. The first glove remains inside the second glove.
            <span epub:type="pagebreak" role="doc-pagebreak" id="page_14" aria-label="Page 14" />
          </p>
        </figcaption>
      </figure>
